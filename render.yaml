# render.yaml — Render Blueprint for Chloe Memories
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─────────────────────────────────────────────
  # Backend — Node.js / Express Web Service
  # ─────────────────────────────────────────────
  - type: web
    name: chloe-memories-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false          # set manually in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false          # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # set to your frontend URL after first deploy

  # ─────────────────────────────────────────────
  # Frontend — React / Vite Static Site
  # ─────────────────────────────────────────────
  - type: web
    name: chloe-memories
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      # SPA fallback — redirect all routes to index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false          # set to your backend URL, e.g. https://chloe-memories-api.onrender.com
