# render.yaml — Chloe Memories (1 Web Service: backend serves API + React build)
# Cùng 1 URL cho cả frontend lẫn backend — giống pattern AcquyThanhtu

services:
  - type: web
    name: chloe-memories
    runtime: node
    region: singapore

    # Build: build React client trước, rồi cài backend deps
    buildCommand: cd client && npm install && npm run build && cd ../backend && npm install

    # Start: chạy Express — sẽ serve API + client/dist
    startCommand: cd backend && node server.js

    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_BASE
        value: ""              # Empty string = dùng relative /api trên cùng domain
      - key: MONGO_URI
        sync: false            # Điền trong Render dashboard
      - key: JWT_SECRET
        sync: false            # Điền trong Render dashboard
      - key: CLOUDINARY_CLOUD_NAME
        sync: false            # Điền trong Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false            # Điền trong Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false            # Điền trong Render dashboard
